openapi: 3.0.0
info:
  title: ICAA Login
  version: 1.0.0
  description: An API for logging into ICAA.
servers:
  - url: https://api.icaa.world/
    description: Production server
  - url: http://localhost:3001/
    description: Local dev server
security:
  - icaaCookieAuth: []
  - icaaBearerAuth: []
paths:
  /login/google:
    post:
      summary: Logs in and returns the auth cookie
      requestBody:
        required: true
        description: The Google JWT to log in with
        content:
          application/json:
            schema:
              type: object
              required:
                - googleJWT
              properties:
                googleJWT:
                  type: string
      security: []
      responses:
        '200':
          description: >
            Auth successful.
            The access and refresh tokens are returned in cookies named `ICAA_ACCESS_TOKEN` and `ICAA_REFRESH_TOKEN`.
          headers:
            Set-Cookie:
              schema: 
                type: string
                example: ICAA_ACCESS_TOKEN=<access_token>; Path=/; HttpOnly, ICAA_REFRESH_TOKEN=<refresh_token>; Path=/; HttpOnly
              description: The ICAA auth token cookies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /login/session:
    get:
      summary: Returns info about the current session/user
      description: Returns information about the currently logged in user.
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Logs the user out
      description: For cookie based auth, deletes the cookies and revokes the refresh token, effectively logging the user out.
      security:
        - icaaCookieAuth: []
      responses:
        '200':
          description: User logged out
          headers:
            Set-Cookie:
              schema:
                type: string
                example: ICAA_ACCESS_TOKEN=; Path=/; Max-Age=0;, ICAA_REFRESH_TOKEN=; Path=/; Max-Age=0;
              description: Tells the browser to delete the cookies.
  /login/refresh:
    post:
      summary: Refreshes the access token using a refresh token
      description: >
        Uses the refresh token cookie to generate a new access token.
        The old refresh token is invalidated and a new one is issued (token rotation).
      security:
        - icaaRefreshCookieAuth: []
      responses:
        '200':
          description: Token refresh successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: ICAA_ACCESS_TOKEN=<new_access_token>; Path=/; HttpOnly, ICAA_REFRESH_TOKEN=<new_refresh_token>; Path=/; HttpOnly
              description: New access and refresh token cookies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized - invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    icaaCookieAuth:
      type: apiKey
      in: cookie
      name: ICAA_ACCESS_TOKEN
      description: ICAA access token cookie
    icaaBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ICAA access token in Authorization header
    icaaRefreshCookieAuth:
      type: apiKey
      in: cookie
      name: ICAA_REFRESH_TOKEN
      description: ICAA refresh token cookie (for token refresh endpoint)
  schemas:
    UserInfo:
      type: object
      required:
        - profilePicURL
        - expiresAt
        - userEmail
        - roles
      properties:
        profilePicURL:
          type: string
        expiresAt:
          type: string
          format: date-time
        userEmail:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - ADMIN
          description: User's assigned roles
    ErrorCode:
      type: string
      enum:
        - InternalError
        - AuthError
        - InputValidationError
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
          example: InternalError
        message:
          type: string
          example: An unexpected error occurred.
