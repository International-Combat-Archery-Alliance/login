AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ICAA Login API

Parameters:
  architecture:
    Description: Architecure to run on
    Type: String
    # TODO: ideally this would be arm, but it's been a struggle to get arm to actually work with SAM
    Default: x86_64
    AllowedValues:
      - arm64
      - x86_64

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        DYNAMO_TABLE_NAME: login-api

Resources:
  LoginHttp:
    Type: AWS::Serverless::HttpApi
  LoginApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: api.icaa.world
      ApiId: !Ref LoginHttp
      Stage: !Ref LoginHttp.Stage
      ApiMappingKey: login

  # DynamoDB Table for refresh tokens and other login-related data
  LoginApiTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: login-api
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ICAALogin:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - !Ref architecture
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource: !GetAtt LoginApiTable.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/jwtSigningKeys"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/adminEmails"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/newrelic-license-key"
      Events:
        LoginApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref LoginHttp
            Path: '/{proxy+}'
            Method: ANY
    Metadata:
      DockerTag: v1
      DockerContext: .
      Dockerfile: Dockerfile

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ICAALogin}
      RetentionInDays: 30
